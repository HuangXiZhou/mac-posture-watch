name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What workflow or posture-monitoring case should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy Impact
      description: Does this add storage, uploads, logs, or new third-party calls?
    validations:
      required: true
